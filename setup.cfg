[flake8]
max-line-length = 120
max-complexity = 18
docstring-convention = google
per-file-ignores = __init__.py: F401
    tests/*.py: D100, D103


exclude = .git,
    __pycache__,
    setup.py,
    build,
    dist,
    docs,
    releases,
    .venv,
    .tox,
    .mypy_cache,
    .pytest_cache,
    .vscode,
    .github,

[mypy]
ignore_missing_imports = True
explicit_package_bases = True

[tool.isort]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 120
skip_gitignore = true
# you can skip files as below
#skip_glob = docs/conf.py


[coverage:run]
# uncomment the following to omit files during running

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    class .*\bProtocol\):
    if TYPE_CHECKING:


[tox:tox]
isolated_build = true
envlist = py311, format, lint, build-linux, build-macos, audit

[gh-actions]
python =
    3.11: py311, format, lint, build

[testenv]
allowlist_externals = pytest
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
commands =
    pytest --cov=runzi --cov-branch --cov-report=xml --cov-report=term-missing tests runzi

[testenv:audit]
allowlist_externals =
	poetry
commands =
    poetry export --all-groups --output audit.txt
    poetry run pip-audit -r audit.txt --require-hashes
	poetry run safety scan

[testenv:format]
allowlist_externals =
    isort
    black
commands =
    isort runzi tests
    black runzi tests

[testenv:lint]
allowlist_externals =
    flake8
    mypy
commands =
    flake8 runzi tests
    mypy runzi tests

[testenv:build-linux]
platform = linux
allowlist_externals =
    poetry
    mkdocs
commands =
    poetry build

[testenv:build-macos]
platform = darwin
allowlist_externals =
    poetry
commands =
    poetry build