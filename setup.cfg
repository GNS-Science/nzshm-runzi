[mypy]
explicit_package_bases = True
follow_untyped_imports = True


[coverage:run]
# uncomment the following to omit files during running

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    class .*\bProtocol\):
    if TYPE_CHECKING:


[tox:tox]
isolated_build = true
envlist = py311, format, lint, build-linux, build-macos, audit

[gh-actions]
python =
    3.11: py311, format, lint, build

[testenv]
allowlist_externals = pytest
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
commands =
    pytest --cov=runzi --cov-branch --cov-report=xml --cov-report=term-missing tests runzi

[testenv:audit]
allowlist_externals =
	uv
commands =
    uv export --all-groups --no-emit-project --output-file audit.txt
    uv run pip-audit -r audit.txt --require-hashes
	uv run safety scan

[testenv:format]
allowlist_externals =
    ruff
commands =
    ruff check --select I --fix runzi tests
    ruff format runzi tests

[testenv:lint]
allowlist_externals =
    ruff
    mypy
commands =
    ruff check runzi tests
    ruff format --check runzi tests
    mypy runzi tests

[testenv:build-linux]
platform = linux
allowlist_externals =
    uv
    mkdocs
commands =
    uv build
    mkdocs build

[testenv:build-macos]
platform = darwin
allowlist_externals =
    uv
    mkdocs
commands =
    uv build
    mkdocs build
